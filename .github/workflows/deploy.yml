# Builds and pushes service + frontend images to Artifact Registry.
# Deployment is handled by Flux GitOps in the TravelManagerIaC repo (image
# automation picks up new tags) — this workflow no longer runs `helm upgrade`.
name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'packages/**'
      - 'app/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'Dockerfile.service'
      - 'vitest.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGION: europe-west1

permissions:
  contents: read
  id-token: write   # Workload Identity Federation

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - name: Unit tests
        run: npm run test
      - name: Build all services (compile check)
        run: |
          for s in api-gateway user-service trip-service destination-service \
                   social-service travel-info-service notification-service \
                   provisioner-service metering-service; do
            npm run build --workspace services/$s
          done

  images:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - trip-service
          - destination-service
          - social-service
          - travel-info-service
          - notification-service
          - provisioner-service
          - metering-service
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
      - name: Build & push ${{ matrix.service }}
        run: |
          IMG="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/travelmanager/${{ matrix.service }}"
          docker build -f Dockerfile.service --build-arg SERVICE=${{ matrix.service }} \
            -t "$IMG:${GITHUB_SHA}" -t "$IMG:latest" .
          docker push "$IMG:${GITHUB_SHA}"
          docker push "$IMG:latest"

  frontend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
      - name: Build & push frontend
        run: |
          IMG="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/travelmanager/frontend"
          docker build -t "$IMG:${GITHUB_SHA}" -t "$IMG:latest" .
          docker push "$IMG:${GITHUB_SHA}"
          docker push "$IMG:latest"
