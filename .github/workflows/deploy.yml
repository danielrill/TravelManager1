# Builds and pushes service + frontend images to Artifact Registry.
# Deployment is handled by Flux GitOps in the TravelManagerIaC repo (image
# automation picks up new tags) — this workflow no longer runs `helm upgrade`.
name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'packages/**'
      - 'app/**'
      - 'tests/**'
      - 'nuxt.config.js'
      - 'jsconfig.json'
      - 'Dockerfile'
      - 'Dockerfile.service'
      - 'vitest.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGION: europe-west1

permissions:
  contents: read
  id-token: write   # Workload Identity Federation

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - name: Unit tests
        run: npm run test
      - name: Build all services (compile check)
        run: |
          for s in api-gateway user-service trip-service destination-service \
                   social-service travel-info-service notification-service \
                   provisioner-service metering-service; do
            npm run build --workspace services/$s
          done

  # Compute ONE sortable tag shared by all 9 images. Flux image-automation
  # orders tags numerically by the <unix-ts> segment (see TravelManagerIaC
  # image-automation/image-policy.yaml: ^main-(?P<ts>[0-9]+)-[a-f0-9]+$) and
  # writes the newest back into the HelmRelease, which rolls every service.
  # All images MUST carry the identical tag: the chart applies one shared
  # global.imageTag to all 9 (_helpers.tpl tm.image), and the ImageRepository
  # tracks only api-gateway as the representative — a per-job timestamp would
  # desync frontend from services and break image pulls.
  prep:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute image tag
        id: tag
        run: echo "tag=main-$(date +%s)-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

  images:
    needs: [test, prep]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - trip-service
          - destination-service
          - social-service
          - travel-info-service
          - notification-service
          - provisioner-service
          - metering-service
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
      - name: Build & push ${{ matrix.service }}
        run: |
          IMG="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/travelmanager/${{ matrix.service }}"
          TAG="${{ needs.prep.outputs.tag }}"
          docker build -f Dockerfile.service --build-arg SERVICE=${{ matrix.service }} \
            -t "$IMG:${TAG}" -t "$IMG:${GITHUB_SHA}" -t "$IMG:latest" .
          docker push "$IMG:${TAG}"
          docker push "$IMG:${GITHUB_SHA}"
          docker push "$IMG:latest"

  frontend:
    needs: [test, prep]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
      - name: Build & push frontend
        run: |
          IMG="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/travelmanager/frontend"
          TAG="${{ needs.prep.outputs.tag }}"
          docker build -t "$IMG:${TAG}" -t "$IMG:${GITHUB_SHA}" -t "$IMG:latest" .
          docker push "$IMG:${TAG}"
          docker push "$IMG:${GITHUB_SHA}"
          docker push "$IMG:latest"

  # Immutable terraform+helm image the provisioner-service runs as a Job to build a
  # dedicated enterprise cluster. Its build context (terraform_enterprise/ module +
  # Helm chart + Dockerfile) lives in the sibling TravelManagerIaC repo, so we check
  # that out (IAC_REPO_TOKEN: a PAT with read access to it) and build from there.
  # Tagged with the SAME tag as the app so an enterprise cluster gets a matching app
  # version. WIF is scoped to this repo, so the build must run here (not in the IaC repo).
  enterprise-provisioner:
    needs: [test, prep]
    runs-on: ubuntu-latest
    # Requires IAC_REPO_TOKEN (PAT for the sibling IaC repo). Until that secret is
    # set, this job exits cleanly and leaves the rest of the pipeline green.
    env:
      IAC_REPO_TOKEN: ${{ secrets.IAC_REPO_TOKEN }}
    steps:
      - name: Check IaC repo token
        id: iac-token
        run: |
          if [ -n "$IAC_REPO_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "IAC_REPO_TOKEN is not set; skipping enterprise-provisioner image build."
          fi
      - name: Checkout IaC repo (build context)
        if: steps.iac-token.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          repository: cikoglukai/TravelManagerIaC
          token: ${{ env.IAC_REPO_TOKEN }}
          path: iac
      - id: auth
        if: steps.iac-token.outputs.available == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}
      - if: steps.iac-token.outputs.available == 'true'
        uses: google-github-actions/setup-gcloud@v2
      - if: steps.iac-token.outputs.available == 'true'
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
      - name: Build & push enterprise-provisioner
        if: steps.iac-token.outputs.available == 'true'
        run: |
          IMG="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/travelmanager/enterprise-provisioner"
          TAG="${{ needs.prep.outputs.tag }}"
          docker build -f iac/enterprise-provisioner/Dockerfile \
            -t "$IMG:${TAG}" -t "$IMG:${GITHUB_SHA}" -t "$IMG:latest" iac
          docker push "$IMG:${TAG}"
          docker push "$IMG:${GITHUB_SHA}"
          docker push "$IMG:latest"
