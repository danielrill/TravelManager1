# Local end-to-end stack: Postgres (6 DBs) + 7 services + frontend behind nginx.
# Pub/Sub disabled (workers use HTTP push / manual task triggers locally).
# Gateway runs in skip-auth mode — send `x-debug-uid: <uid>` instead of a JWT.
#
#   docker compose -f docker-compose.dev.yml up --build
#   curl localhost:8080/api/destinations
#   curl -H 'x-debug-uid: u_demo' -X POST localhost:8080/api/users -d '{"name":"Demo"}'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./scripts/init-multi-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pg_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Central PgBouncer (transaction pooling) — single hop to postgres, mirrors
  # the prod topology. Config + userlist mounted from ./pgbouncer.
  pgbouncer:
    image: edoburu/pgbouncer:1.24.1
    command: ["pgbouncer", "/etc/pgbouncer/pgbouncer.ini"]
    volumes:
      - ./pgbouncer/pgbouncer.dev.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.dev.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "pgbouncer -V >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on: { postgres: { condition: service_healthy } }

  user-service:
    build: { context: ., dockerfile: Dockerfile.service, args: { SERVICE: user-service } }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_user
      REDIS_URL: redis://redis:6379
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }

  trip-service:
    build: { context: ., dockerfile: Dockerfile.service, args: { SERVICE: trip-service } }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_trip
      DESTINATION_SERVICE_URL: http://destination-service:8080
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
      REDIS_URL: redis://redis:6379
      PUBSUB_DISABLED: "1"
      # Vertex AI embeddings: off by default (no creds). To enable real semantic
      # recs locally, set GOOGLE_CLOUD_PROJECT + mount ADC, then VERTEX_DISABLED=0.
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-europe-west1}
      VERTEX_DISABLED: ${VERTEX_DISABLED:-1}
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }

  destination-service:
    build: { context: ., dockerfile: Dockerfile.service, args: { SERVICE: destination-service } }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_destination
      TRIP_SERVICE_URL: http://trip-service:8080
      REDIS_URL: redis://redis:6379
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }

  social-service:
    build: { context: ., dockerfile: Dockerfile.service, args: { SERVICE: social-service } }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_social
      USER_SERVICE_URL: http://user-service:8080
      TRIP_SERVICE_URL: http://trip-service:8080
      PUBSUB_DISABLED: "1"
    depends_on: { pgbouncer: { condition: service_healthy } }

  travel-info-service:
    build: { context: ., dockerfile: Dockerfile.service, args: { SERVICE: travel-info-service } }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_travelinfo
      TRIP_SERVICE_URL: http://trip-service:8080
      PUBSUB_DISABLED: "1"
    depends_on: { pgbouncer: { condition: service_healthy } }

  notification-service:
    build: { context: ., dockerfile: Dockerfile.service, args: { SERVICE: notification-service } }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_notification
      USER_SERVICE_URL: http://user-service:8080
      PUBSUB_DISABLED: "1"
    depends_on: { pgbouncer: { condition: service_healthy } }

  api-gateway:
    build: { context: ., dockerfile: Dockerfile.service, args: { SERVICE: api-gateway } }
    environment:
      GATEWAY_SKIP_AUTH: "1"
      USER_SERVICE_URL: http://user-service:8080
      TRIP_SERVICE_URL: http://trip-service:8080
      DESTINATION_SERVICE_URL: http://destination-service:8080
      SOCIAL_SERVICE_URL: http://social-service:8080
      TRAVEL_INFO_SERVICE_URL: http://travel-info-service:8080
      REDIS_URL: redis://redis:6379
    depends_on:
      - user-service
      - trip-service
      - destination-service
      - redis

  frontend:
    build: { context: ., dockerfile: Dockerfile }
    environment:
      NUXT_PUBLIC_API_BASE: ""

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - frontend

volumes:
  pg_dev:
