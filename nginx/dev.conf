# Local dev reverse proxy: /api -> gateway, everything else -> frontend.
upstream gateway  { server api-gateway:8080; }
upstream frontend { server frontend:8080; }

server {
  listen 80;

  location /api/ {
    proxy_pass http://gateway;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header x-debug-uid $http_x_debug_uid;
  }

  location / {
    proxy_pass http://frontend;
    proxy_set_header Host $host;
  }
}
