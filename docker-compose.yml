services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: travelmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/travelmanager
      - NITRO_HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: