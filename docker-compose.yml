services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: travelmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/travelmanager
      - NITRO_HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
