# Local-cluster overlay (kind / minikube / Docker Desktop). Use with:
#   helm upgrade --install travelmanager k8s/travelmanager -f k8s/travelmanager/values-local.yaml
#
# Differences vs prod: in-cluster Postgres (no Cloud SQL sidecar), plain Secrets
# (no External Secrets Operator), nginx ingress (no managed cert / static IP),
# no Workload Identity, Pub/Sub disabled, gateway in skip-auth mode, and locally
# built images (IfNotPresent).
global:
  imageRegistry: travelmanager          # local images tagged travelmanager/<svc>:local
  imageTag: local
  imagePullPolicy: IfNotPresent
  gcpProject: local
  cloudSql:
    enabled: false
  extraEnv:
    - { name: PUBSUB_DISABLED, value: "1" }
    - { name: GATEWAY_SKIP_AUTH, value: "1" }
    # Route Firestore (likes / review-comments) to the in-cluster emulator —
    # no GCP creds needed locally. Emulator serves only the (default) database.
    - { name: FIRESTORE_EMULATOR_HOST, value: "firestore-emulator:8080" }
    - { name: FIRESTORE_DATABASE_ID, value: "(default)" }

postgres:
  enabled: true

redis:
  enabled: true

# Local PgBouncer fronts the in-cluster postgres (postgres:5432) with the
# postgres superuser; services connect via pgbouncer:6432 (see DATABASE_URLs).
pgbouncer:
  auth:
    user: postgres
    password: postgres

firestoreEmulator:
  enabled: true

externalSecrets:
  enabled: false

networkPolicy:
  enabled: false                        # kind's default CNI doesn't enforce them

serviceAccount:
  gcpServiceAccount: ""                 # no Workload Identity locally

ingress:
  enabled: true
  className: nginx
  managedCert: false
  host: ""                              # empty = catch-all → plain http://localhost works

# Plain Secret values for each db-backed service → in-cluster Postgres.
localSecretValues:
  user-service:
    DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_user
    REDIS_URL: redis://redis:6379
  trip-service:
    DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_trip
    FIREBASE_SERVICE_ACCOUNT: "{}"
    REDIS_URL: redis://redis:6379
  destination-service:
    DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_destination
    REDIS_URL: redis://redis:6379
  social-service:
    DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_social
  travel-info-service:
    DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_travelinfo
  notification-service:
    DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/travelmanager_notification
    SENDGRID_API_KEY: ""
  api-gateway:
    FIREBASE_SERVICE_ACCOUNT: "{}"
    REDIS_URL: redis://redis:6379
