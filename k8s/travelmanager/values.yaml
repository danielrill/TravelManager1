# TravelManager Helm values. One image per service in Artifact Registry.
global:
  imageRegistry: europe-west1-docker.pkg.dev/PROJECT_ID/travelmanager
  imageTag: latest
  imagePullPolicy: Always        # local: set IfNotPresent (use loaded images)
  # Cloud SQL instance connection name for the Auth Proxy sidecar.
  cloudSqlInstance: PROJECT_ID:europe-west1:travelmanager-postgres
  gcpProject: PROJECT_ID
  # Resend sender — must be a verified domain. Injected via commonEnv (NOT
  # extraEnv: CI overrides extraEnv wholesale with --set, which would clobber it).
  fromEmail: alerts@onecloudaway.de
  # Public site base URL for links in emails (newsletter trip cards). Defaults to
  # https://<ingress.host> if unset.
  appBaseUrl: https://onecloudaway.de
  cloudSql:
    enabled: true                # local: false -> no sidecar, use in-cluster Postgres
  extraEnv: []                   # local: [{name: PUBSUB_DISABLED, value:"1"}, ...]

  # --- Multitenancy ---
  # Apex domain; the gateway derives the tenant from the subdomain of the Host.
  rootDomain: onecloudaway.de
  # Comma-separated operator emails allowed on admin.onecloudaway.de + /api/admin.
  adminEmails: "kaicikoglu@gmail.com"
  # Provisioner creates a dedicated Postgres pod per standard tenant via the k8s
  # API. Enabled in-cluster; disabled locally (no API access / single Postgres).
  provisionerK8sEnabled: true
  # Shared cluster-internal credential for tenant Postgres pods (v1; NetworkPolicy
  # isolates the pods). Secret holds keys: username, password. Hardening: per-tenant.
  tenantDbSecret: tenant-db-credential
  tenantDbHostSuffix: ""         # e.g. .travelmanager.svc.cluster.local (cross-namespace)
  # Standard tenants get their OWN application pods (compute isolation) alongside
  # their Postgres pod — the provisioner creates a Deployment+Service+HPA per
  # backend service named <svc>-<tenant>. Each tenant deployment scales 1→2.
  # All on the same GKE cluster. Toggle off to fall back to shared app pods.
  tenantDedicatedPods: true
  tenantAppHpaMin: 1
  tenantAppHpaMax: 2

# In-cluster Postgres — LOCAL ONLY (kind/minikube). Prod uses Cloud SQL.
postgres:
  enabled: false

# In-cluster Redis — LOCAL ONLY. Prod uses Memorystore (REDIS_URL via ESO).
redis:
  enabled: false

# Central PgBouncer (transaction pooling). When enabled, db-backed services
# point DATABASE_URL at pgbouncer:6432 and DROP their own Cloud SQL proxy
# sidecar — only the PgBouncer pod talks to Cloud SQL, so total server
# connections are capped at maxDbConnections regardless of pod count.
pgbouncer:
  enabled: true
  replicas: 2
  image: edoburu/pgbouncer:v1.24.1-p1
  poolMode: transaction
  maxClientConn: 1000
  defaultPoolSize: 20
  maxDbConnections: 80          # keep under Cloud SQL max_connections
  databases:
    - travelmanager_user
    - travelmanager_trip
    - travelmanager_destination
    - travelmanager_social
    - travelmanager_travelinfo
    - travelmanager_notification
  auth:
    user: travelmanager         # local overrides to postgres
    password: ""                # only used for the local plain Secret
  # Prod: Secret Manager id holding the userlist.txt line(s), synced by ESO.
  userlistSecret: pgbouncer-userlist

# In-cluster Firestore emulator — LOCAL ONLY. Prod uses real Firestore (ADC via
# Workload Identity). When enabled, set FIRESTORE_EMULATOR_HOST in global.extraEnv.
firestoreEmulator:
  enabled: false

# Per-service plain Secret values, used only when externalSecrets.enabled=false
# (local). Map: service -> { ENV_KEY: value }.
localSecretValues: {}

# NetworkPolicies enforce that downstream services are reachable only from other
# TravelManager pods (the gateway), not arbitrary workloads — required because
# services trust gateway-injected identity headers.
networkPolicy:
  enabled: true

# External Secrets Operator pulls these from GCP Secret Manager.
externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef: gcp-secret-store

ingress:
  enabled: true
  className: gce                 # local: nginx
  managedCert: false             # superseded by the wildcard pre-shared cert
  # Empty host = the single rule matches ANY Host, so every tenant subdomain
  # (tui.onecloudaway.de, admin.onecloudaway.de, …) routes through the same
  # /api→gateway, /→frontend paths. The gateway differentiates by Host.
  host: ""
  # certMap (networking.gke.io/certmap → Certificate Manager wildcard) is the
  # intended end state for tenant-subdomain TLS, BUT ingress-gce on this cluster
  # failed to attach it (HTTPS proxy got torn down and never rebuilt → apex
  # outage). Left empty until certmap is proven; the template still supports it.
  certMap: ""
  # Self-managed WILDCARD classic SSL cert (*.onecloudaway.de + apex), issued via
  # Let's Encrypt DNS-01 and uploaded with `gcloud compute ssl-certificates`.
  # Covers the apex, admin.onecloudaway.de, and every tenant subdomain. Pre-shared
  # certs swap IN PLACE on ingress-gce (no proxy recreate, no outage) — unlike
  # certMap, which is unsupported here (tore down the HTTPS proxy). Matches what's
  # live on the Ingress, so a Helm apply is a no-op on the proxy.
  # RENEWAL: Let's Encrypt 90-day (expires 2026-09-12). Manual — re-run certbot,
  # re-upload as a NEW cert name, re-point preSharedCert + redeploy.
  preSharedCert: onecloudaway-wildcard-classic
  staticIpName: travelmanager-ip
  managedCertName: travelmanager-cert

# Synchronous request/response services (Deployment + Service + HPA).
syncServices:
  api-gateway:
    port: 8080
    db: false
    healthPath: /healthz
    hpa: { min: 1, max: 4, cpu: 70 }
  user-service:
    port: 8080
    db: true
    healthPath: /api/health      # liveness — always 200 while process is up
    readinessPath: /api/ready    # readiness — 503 until DB schema bootstrapped
    hpa: { min: 1, max: 4, cpu: 70 }
  trip-service:
    port: 8080
    db: true
    healthPath: /api/health
    readinessPath: /api/ready
    hpa: { min: 1, max: 4, cpu: 70 }
  destination-service:
    port: 8080
    db: true
    healthPath: /api/health
    readinessPath: /api/ready
    hpa: { min: 1, max: 4, cpu: 70 }
  frontend:
    port: 8080
    db: false
    healthPath: /
    hpa: { min: 1, max: 4, cpu: 70 }
  # Holds k8s RBAC to create per-tenant Postgres pods. No shared DB of its own
  # (talks to tenant pods + user-service). Single replica — provisioning is rare.
  provisioner-service:
    port: 8080
    db: false
    replicas: 1
    healthPath: /api/health
    readinessPath: /api/ready

# Async worker services: HTTP listener (control + push) + Pub/Sub subscribers.
workerServices:
  social-service:
    port: 8080
    db: true
    readinessPath: /api/ready    # 503 until DB schema bootstrapped
    hpa: { min: 1, max: 4, cpu: 70 }
  travel-info-service:
    port: 8080
    db: true
    readinessPath: /api/ready
    hpa: { min: 1, max: 4, cpu: 70 }
  notification-service:
    port: 8080
    db: true
    readinessPath: /api/ready
    hpa: { min: 1, max: 4, cpu: 70 }

# Scheduled jobs. They POST to a service's task endpoint.
cronJobs:
  poll-warnings:
    schedule: "0 * * * *"          # hourly
    target: "http://travel-info-service:8080/api/tasks/poll-warnings"
  poll-weather:
    schedule: "0 */6 * * *"        # every 6h (lower priority)
    target: "http://travel-info-service:8080/api/tasks/poll-weather"
  newsletter:
    schedule: "0 8 * * 1"          # Monday 08:00
    target: "http://social-service:8080/api/tasks/newsletter"
  backfill-embeddings:
    schedule: "0 */6 * * *"        # every 6h — fills trips missing an embedding
    target: "http://trip-service:8080/api/tasks/backfill-embeddings"

resources:
  requests: { cpu: 100m, memory: 192Mi }
  limits:   { cpu: 1000m, memory: 512Mi }   # was 500m — half-core throttled the Node event loop, probes timed out

# Workload Identity: bind this KSA to a GCP SA that can access Secret Manager,
# Cloud SQL and Pub/Sub.
serviceAccount:
  gcpServiceAccount: travelmanager-gke@PROJECT_ID.iam.gserviceaccount.com

# Per-service env secrets synced from GCP Secret Manager by ESO. Map of
# k8s-secret-key -> Secret Manager secret id.
serviceSecrets:
  user-service:
    DATABASE_URL: user-database-url
    REDIS_URL: redis-url
  trip-service:
    DATABASE_URL: trip-database-url
    GOOGLE_MAPS_SERVER_KEY: google-maps-server-key
    FIREBASE_SERVICE_ACCOUNT: firebase-service-account
    REDIS_URL: redis-url
  destination-service:
    DATABASE_URL: destination-database-url
    REDIS_URL: redis-url
  social-service:
    DATABASE_URL: social-database-url
  travel-info-service:
    DATABASE_URL: travel-info-database-url
  notification-service:
    DATABASE_URL: notification-database-url
    RESEND_API_KEY: resend-api-key
  api-gateway:
    FIREBASE_SERVICE_ACCOUNT: firebase-service-account
    REDIS_URL: redis-url
