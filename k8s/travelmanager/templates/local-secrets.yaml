{{- if not .Values.externalSecrets.enabled }}
{{- range $svc, $keys := .Values.serviceSecrets }}
---
# Plain Secret for LOCAL clusters (when External Secrets Operator is disabled).
# Values come from .Values.localSecretValues.<service>; any key not provided
# falls back to empty string. Prod uses ExternalSecrets instead.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $svc }}-secrets
type: Opaque
stringData:
  {{- $vals := get $.Values.localSecretValues $svc | default dict }}
  {{- range $envKey, $smId := $keys }}
  {{ $envKey }}: {{ get $vals $envKey | default "" | quote }}
  {{- end }}
{{- end }}
{{- end }}
