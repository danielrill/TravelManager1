# Kubernetes SA bound to a GCP SA via Workload Identity. All workloads run as
# this SA so they can reach Cloud SQL, Pub/Sub and Secret Manager without keys.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: travelmanager
  {{- if .Values.serviceAccount.gcpServiceAccount }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount }}
  {{- end }}
