{{- if .Values.externalSecrets.enabled }}
{{- range $svc, $keys := .Values.serviceSecrets }}
---
# Syncs GCP Secret Manager values into a k8s Secret consumed via envFrom.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $svc }}-secrets
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.externalSecrets.secretStoreRef }}
    kind: ClusterSecretStore
  target:
    name: {{ $svc }}-secrets
    creationPolicy: Owner
  data:
    {{- range $envKey, $smId := $keys }}
    - secretKey: {{ $envKey }}
      remoteRef:
        key: {{ $smId }}
    {{- end }}
{{- end }}
{{- end }}
