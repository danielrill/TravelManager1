{{- if .Values.ingress.enabled }}
# Ingress. On GKE: gce class + Google-managed cert + static IP. Locally: set
# ingress.className=nginx and ingress.managedCert=false (plain HTTP via the
# ingress-nginx controller). /api → gateway, everything else → frontend SPA.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travelmanager
  annotations:
    {{- if eq (.Values.ingress.className | default "gce") "gce" }}
    kubernetes.io/ingress.global-static-ip-name: {{ .Values.ingress.staticIpName }}
    {{- if .Values.ingress.managedCert }}
    networking.gke.io/managed-certificates: {{ .Values.ingress.managedCertName }}
    {{- end }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "gce" }}
  rules:
    -
      {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host }}
      {{- end }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
{{- if and .Values.ingress.managedCert (eq (.Values.ingress.className | default "gce") "gce") }}
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: {{ .Values.ingress.managedCertName }}
spec:
  domains:
    - {{ .Values.ingress.host }}
{{- end }}
{{- end }}
