# Local PgBouncer config (docker-compose.dev.yml). Fronts the in-cluster
# `postgres` container; transaction pooling, mirroring the prod Helm config.
[databases]
travelmanager_user = host=postgres port=5432 dbname=travelmanager_user
travelmanager_trip = host=postgres port=5432 dbname=travelmanager_trip
travelmanager_destination = host=postgres port=5432 dbname=travelmanager_destination
travelmanager_social = host=postgres port=5432 dbname=travelmanager_social
travelmanager_travelinfo = host=postgres port=5432 dbname=travelmanager_travelinfo
travelmanager_notification = host=postgres port=5432 dbname=travelmanager_notification

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20
max_db_connections = 80
server_tls_sslmode = disable
ignore_startup_parameters = extra_float_digits,options
